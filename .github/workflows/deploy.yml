name: Deploy to EC2

on:
  push:
    branches:
      - main

  # Allow manual deploys from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy & Verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Make npm/pm2 available regardless of how Node was installed
            export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH"

            cd /var/www/toggle-travel

            echo "=== Pulling latest code ==="
            git reset --hard HEAD
            git pull origin main

            echo "=== Installing dependencies ==="
            npm install --omit=dev

            echo "=== Reloading app ==="
            pm2 reload toggle-travel --update-env

            echo "=== Waiting for workers to come up ==="
            sleep 5

            echo "=== Health check (retrying up to 5x) ==="
            for i in 1 2 3 4 5; do
              HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost/health)
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ Healthy — HTTP $HTTP_STATUS"
                pm2 status
                exit 0
              fi
              echo "Attempt $i: HTTP $HTTP_STATUS — waiting 3s..."
              sleep 3
            done

            echo "❌ Health check failed after 5 attempts"
            pm2 logs toggle-travel --lines 40 --nostream
            exit 1
