name: Deploy to EC2

on:
  push:
    branches:
      - main

  # Allow manual deploys from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Make npm/pm2 available — handles NodeSource and nvm installs
            export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH"

            cd /var/www/toggle-travel

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Installing dependencies ---"
            npm install --omit=dev

            echo "--- Reloading app (zero downtime) ---"
            pm2 reload toggle-travel --update-env

            echo "--- Done ---"
            pm2 status

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost/health)
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "Health check failed: HTTP $HTTP_STATUS"
              export PATH="/usr/local/bin:/usr/bin:$PATH"
              pm2 logs toggle-travel --lines 30 --nostream
              exit 1
            fi
            echo "✅ Deployment verified — HTTP $HTTP_STATUS"
