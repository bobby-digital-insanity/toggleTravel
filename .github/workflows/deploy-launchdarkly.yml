name: Deploy — LaunchDarkly EC2

on:
  push:
    branches:
      - launchdarkly
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to LaunchDarkly EC2
    runs-on: ubuntu-latest
    env:
      LD_SDK_KEY: ${{ secrets.LD_SDK_KEY_LD }}
      LD_CLIENT_SIDE_ID: ${{ secrets.LD_CLIENT_SIDE_ID_LD }}

    steps:
      - name: Deploy & Verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_LD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_LD }}
          port: 22
          envs: LD_SDK_KEY,LD_CLIENT_SIDE_ID
          script: |
            export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH"

            set -e
            cd /var/www/toggle-travel

            echo "=== Pulling latest code (launchdarkly) ==="
            git reset --hard HEAD
            git pull origin launchdarkly

            echo "=== Injecting LaunchDarkly keys into .env ==="
            sed -i '/^LD_SDK_KEY=/d' .env
            sed -i '/^LD_CLIENT_SIDE_ID=/d' .env
            echo "LD_SDK_KEY=$LD_SDK_KEY" >> .env
            echo "LD_CLIENT_SIDE_ID=$LD_CLIENT_SIDE_ID" >> .env

            echo "=== Installing dependencies ==="
            npm install --omit=dev

            echo "=== Reloading Nginx config ==="
            sudo cp deployment/nginx.conf /etc/nginx/conf.d/toggle-travel.conf
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Restarting app ==="
            pm2 delete toggle-travel || true
            pm2 start deployment/ecosystem.config.js --env production
            pm2 save

            echo "=== Waiting for workers to come up ==="
            sleep 5

            echo "=== PM2 status ==="
            pm2 status

            echo "=== Port check ==="
            ss -tlnp | grep 3000 || echo "Nothing on port 3000"

            echo "=== Recent app logs ==="
            pm2 logs toggle-travel --lines 20 --nostream

            echo "=== Health check (retrying up to 5x) ==="
            for i in 1 2 3 4 5; do
              HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ Healthy — HTTP $HTTP_STATUS"
                exit 0
              fi
              echo "Attempt $i: HTTP $HTTP_STATUS — waiting 3s..."
              sleep 3
            done

            echo "❌ Health check failed — final PM2 logs:"
            pm2 logs toggle-travel --lines 40 --nostream
            exit 1
